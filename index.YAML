<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purple Portal - Separated</title>
<!-- Link to CSS -->
<link rel="stylesheet" href="style.css">
    <style>
        /* Small addition to handle side-by-side buttons */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .cancel-btn {
            background-color: #6c757d !important; /* Grey color for cancel */
        }
    </style>
</head>
<body>

<header>
<nav>
<a onclick="showSection('hero')">Home</a>
<a onclick="showSection('admin-login-form')" style="color: #FFD700;">Admin</a>
<a>Financials</a>
<a>Career</a>
</nav>
<div class="auth-buttons">
<button onclick="showSection('login-form')">Login</button>
<button onclick="showSection('signup-form')">Sign Up</button>
</div>
</header>

<div class="container">
<div id="hero" class="section" style="display: block; text-align: center;">
<h1>Purple Web Services</h1>
<p>Please Sign Up or Login to continue.</p>
</div>

<div id="signup-form" class="form-card section">
<h2>Create Account</h2>
<form id="regForm">
<div class="form-group">
<label>First Name<span class="required">*</span></label>
<input type="text" id="fname" placeholder="Enter First Name" required>
</div>
<div class="form-group">
<label>Last Name<span class="required">*</span></label>
<input type="text" id="lname" placeholder="Enter Last Name" required>
</div>
<div class="form-group">
<label>Email ID<span class="required">*</span></label>
<input type="email" id="email" placeholder="example@mail.com" required>
</div>
<div class="form-group">
<label>Username<span class="required">*</span></label>
<input type="text" id="user" placeholder="Choose Username" required>
</div>
<div class="form-group">
<label>Password<span class="required">*</span></label>
<input type="password" id="pass" placeholder="Create Password" required>
</div>
<div class="form-group">
<label>Confirm Password<span class="required">*</span></label>
<input type="password" id="confirm-pass" placeholder="Repeat Password" required>
</div>
                <!-- button type="submit" class="submit-btn">Register</button-->
                
                <!-- Updated Button Section -->
                <div class="button-group">
                    <button type="submit" class="submit-btn">Register</button>
                    <button type="button" class="submit-btn cancel-btn" onclick="handleCancel()">Cancel</button>
                </div>
</form>
</div>

<div id="login-form" class="form-card section">
<h2>Login</h2>
<div class="form-group">
<label>Username</label>
<input type="text" id="login-user">
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="login-pass">
</div>
<button class="submit-btn" onclick="handleLogin()">Enter Portal</button>
</div>

<div id="admin-login-form" class="form-card section">
<h2 style="color: #8B0000;">Admin Access</h2>
<div class="form-group">
<label>Admin User</label>
<input type="text" id="admin-user">
</div>
<div class="form-group">
<label>Admin Pass</label>
<input type="password" id="admin-pass">
</div>
<button class="submit-btn" style="background-color: #000;" onclick="handleAdminLogin()">Verify Admin</button>
</div>

<div id="admin-dashboard" class="section">
<h2 style="color: #4B0082;">Registered Users Database</h2>
<table>
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Email</th>
<th>Username</th>
<th>Password</th>
</tr>
</thead>
<tbody id="user-table-body"></tbody>
</table>
<br>
<button class="submit-btn" onclick="showSection('hero')" style="max-width: 150px;">Exit Admin</button>
</div>

<div id="welcome-page" class="section welcome-msg">
<h1 id="welcome-text">Your Welcome</h1>
<button class="submit-btn" onclick="location.reload()" style="max-width: 150px; margin: 0 auto; display: block;">Logout</button>
</div>
</div>

<footer>
<p>&copy; 2026 Purple Corp. | Privacy Secured</p>
</footer>

<!-- Link to JS -->
<script src="script.js"></script>
</body>
</html>

